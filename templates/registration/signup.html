{% extends "base.html" %}
{% block title %}Signup{% endblock %}

{% block content %}
<style>
  .auth-card {
    max-width: 420px;
    margin: 72px auto;
    padding: 22px;
    border-radius: 18px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.10);
  }
  .auth-title { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
  .auth-sub { opacity: .75; font-size: 13px; margin-bottom: 18px; }
  .auth-btn {
    width: 100%;
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid rgba(25, 135, 84, 0.6);
    background: rgba(25, 135, 84, 0.25);
    color: #fff;
    font-weight: 800;
  }
  .auth-btn:hover { background: rgba(25, 135, 84, 0.35); }
  .help { font-size: 12px; opacity: .7; margin-top: 10px; }
  .field { margin-bottom: 12px; }
  .field label { display:block; font-size:12px; opacity:.8; margin-bottom:6px; }
  .field input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: #fff;
    outline: none;
  }
  .field input:focus {
    border-color: rgba(25, 135, 84, 0.6);
    box-shadow: 0 0 0 0.2rem rgba(25, 135, 84, 0.25);
  }
  .error {
    margin-top: 10px;
    padding: 10px 12px;
    border-radius: 12px;
    background: rgba(220, 53, 69, 0.12);
    border: 1px solid rgba(220, 53, 69, 0.25);
    font-size: 13px;
  }
</style>

<div class="auth-card">
  <div class="auth-title">회원가입</div>
  <div class="auth-sub">NOVA 계정을 만들고 마이 로그를 저장해봐.</div>

  <form method="post">
    {% csrf_token %}

    <div class="field">
      <label for="id_username">아이디</label>
      {{ form.username }}
    </div>

    <div class="field">
      <label for="id_password1">비밀번호</label>
      {{ form.password1 }}
    </div>

    <div class="field">
      <label for="id_password2">비밀번호 확인</label>
      {{ form.password2 }}
    </div>

    <button class="auth-btn" type="submit">가입하기</button>

    {% if form.errors %}
      <div class="error">
        입력값을 다시 확인해줘. (비밀번호 규칙/중복 아이디 등)
      </div>
    {% endif %}
  </form>

  <div class="help">
    이미 계정이 있으면 <a href="{% url 'login' %}" class="text-light">로그인</a>
  </div>
</div>
{% endblock %}
